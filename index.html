    <p>Redirecting to the new location of this tutorial...</p>
    <p>If you are not redirected, <a id="manual-link" href="https://ivan-enzhaev.github.io/">click here</a>.</p>
    <script>
        document.getElementById('manual-link').href = "https://ivan-enzhaev.github.io" + window.location.pathname;
    </script>

    <script>
        // Get the current path
        const oldPath = window.location.pathname;

        // Define the new base URL
        const newBase = "https://ivan-enzhaev.github.io";
        
        // Redirect to the same path on the new domain
        window.location.href = newBase + oldPath;
    </script>
