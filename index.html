
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Ivan Enzhaev</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f6f8fa;
            color: #24292f;
            text-align: center;
        }

        a {
            color: #0969da;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>

<body>
    <div class="container">
        <h1>Moving to a new home...</h1>
        <p>This tutorial and profile have moved to a new professional domain.</p>
        <p>Redirecting you to: <br>
            <a id="manual-link" href="https://ivan-enzhaev.github.io/">ivan-enzhaev.github.io</a>
        </p>
    </div>

    <script>
        // 1. Update the visible link immediately just in case
        const currentPath = window.location.pathname;
        const newBase = "https://ivan-enzhaev.github.io";
        const destination = newBase + currentPath;

        document.getElementById('manual-link').href = destination;
        document.getElementById('manual-link').innerText = destination;

        // 2. Perform the actual redirect
        window.location.href = destination;

    </script>
</body>

</html>
